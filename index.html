<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Business Billing System - User</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&family=Space+Mono:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', 'Hind Siliguri', sans-serif; background: #0b0f1a; color: #fff; height: 100vh; overflow: hidden; }
        .receipt-font { font-family: 'Space Mono', 'Hind Siliguri', monospace; }
        
        #receiptDesign { 
            width: 302px; 
            min-height: auto; 
            background: #fff; 
            color: #000; 
            padding: 15px;
            position: fixed; 
            top: -99999px; 
            display: flex; 
            flex-direction: column;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #000; padding: 5px; font-weight: bold; font-size: 12px; text-align: left; }
        .admin-container { height: 100vh; overflow-y: auto; padding-bottom: 100px; }
        .digital-clock { font-family: 'Space Mono', monospace; }
        #processingOverlay { display: none; background: rgba(0,0,0,0.98); z-index: 10000; }
        .bn-text { font-family: 'Hind Siliguri', sans-serif; }
    </style>
</head>
<body>

<audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
<audio id="successSound" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

<div id="loginOverlay" class="fixed inset-0 bg-black z-[9999] flex items-center justify-center">
    <div class="bg-gray-900 p-8 rounded-3xl border border-gray-800 w-80 text-center">
        <h2 id="loginLabel" class="text-green-500 font-black mb-6 uppercase tracking-widest">Admin Access</h2>
        <input type="password" id="passInput" class="w-full p-3 bg-gray-800 rounded-xl mb-6 text-center text-2xl tracking-[0.5em] outline-none border border-gray-700 text-white">
        <button onclick="checkPass()" id="loginBtn" class="w-full bg-green-600 py-3 rounded-xl font-bold hover:bg-green-500 transition">LOGIN</button>
    </div>
</div>

<div id="processingOverlay" class="fixed inset-0 flex flex-col items-center justify-center">
    <div class="text-green-500 text-9xl font-black mb-4 animate-bounce" id="countdown">১০</div>
    <p class="text-2xl font-bold tracking-widest text-white uppercase bn-text">মেমো তৈরি হচ্ছে...</p>
</div>

<div id="mainApp" class="hidden admin-container">
    <div class="text-center py-6">
        <div id="liveClock" class="digital-clock text-6xl font-bold">00:00:00</div>
        <p id="liveDate" class="text-gray-400 mt-2 text-lg font-bold bn-text"></p>
        <img id="uLogo" src="https://mighty-green-9jc8a8gcjo.edgeone.app/file_00000000f138720b9b211563fe149edf.png" class="w-24 h-24 rounded-full mx-auto mt-6 border-4">
        <h1 id="uName" class="text-3xl font-black mt-3 uppercase tracking-tighter"></h1>
        <p id="uAddress" class="text-gray-400 text-sm font-bold bn-text"></p>
    </div>

    <div class="max-w-lg mx-auto px-4 space-y-6">
        <div class="bg-gray-900 p-4 rounded-2xl border border-gray-700 shadow-lg">
            <div class="flex gap-2">
                <input type="text" id="searchInput" placeholder="TVS-XXXXXX" class="flex-1 p-3 bg-gray-800 rounded-xl outline-none text-white border border-gray-700 uppercase">
                <button onclick="searchMemo()" id="searchBtn" class="bg-blue-600 px-6 py-3 rounded-xl font-bold text-white bn-text">সার্চ</button>
            </div>
            <div id="searchOptions" class="hidden mt-4 flex gap-2">
                <button onclick="quickDownload()" class="flex-1 bg-green-700 py-2 rounded-lg font-bold text-sm text-white bn-text">সরাসরি ডাউনলোড</button>
                <button onclick="editMemo()" class="flex-1 bg-yellow-600 py-2 rounded-lg font-bold text-sm text-white bn-text">এডিট মেমো</button>
            </div>
        </div>

        <div class="bg-gray-900 p-6 rounded-3xl space-y-4 border border-gray-800 shadow-2xl mb-10">
            <input type="text" id="cName" placeholder="ক্রেতার নাম" class="w-full p-4 bg-gray-800 rounded-xl outline-none text-white border border-gray-700 bn-text">
            <input type="text" id="cPhone" placeholder="ফোন নম্বর" class="w-full p-4 bg-gray-800 rounded-xl outline-none text-white border border-gray-700">
            
            <div id="itemsList" class="space-y-3">
                <div class="item-row flex gap-2 items-center">
                    <input type="text" placeholder="পণ্যের নাম" class="item-n flex-1 p-4 bg-gray-800 rounded-xl text-sm text-white border border-gray-700 bn-text">
                    <input type="number" placeholder="দাম" class="item-p w-24 p-4 bg-gray-800 rounded-xl text-sm text-white border border-gray-700">
                    <button onclick="this.parentElement.remove()" class="w-10 h-10 bg-red-600 rounded-full font-black text-white">-</button>
                </div>
            </div>

            <button onclick="addRow()" class="w-full py-3 border-2 border-dashed border-gray-700 text-gray-400 rounded-xl font-bold bn-text">+ আরও পণ্য</button>
            <button id="finalBtn" onclick="confirmDialog()" class="w-full py-5 rounded-2xl font-black text-2xl mt-6 shadow-xl active:scale-95 transition text-white bn-text">ফিনিশ ও ডাউনলোড</button>
        </div>
    </div>
</div>

<div id="receiptDesign">
    <div class="text-center border-b-2 border-black pb-2 mb-2">
        <img id="rLogo" src="https://mighty-green-9jc8a8gcjo.edgeone.app/file_00000000f138720b9b211563fe149edf.png" crossorigin="anonymous" class="w-16 h-16 rounded-full mx-auto mb-1">
        <h1 id="rShopName" class="text-xl font-black uppercase"></h1>
        <p id="rShopAddress" class="text-[10px] font-bold bn-text"></p>
        <p id="rShopPhone" class="text-[10px] font-bold"></p>
    </div>

    <div class="text-[10px] font-bold mb-2 flex justify-between bg-gray-100 p-1">
        <span id="resID">ID: --</span>
        <span id="resDateTime" class="bn-text">--</span>
    </div>

    <div class="text-[11px] font-bold mb-2 bn-text">
        <p>ক্রেতা: <span id="resName">--</span></p>
        <p>মোবাইল: <span id="resPhone">--</span></p>
    </div>

    <table>
        <thead id="rTableHead" class="text-white text-[10px]">
            <tr>
                <th>বিবরণ</th>
                <th class="w-16 text-right">মূল্য</th>
            </tr>
        </thead>
        <tbody id="rTableBody" class="receipt-font text-[10px]"></tbody>
    </table>

    <div class="mt-4 border-t-2 border-black pt-2">
        <div class="flex justify-between items-center">
            <p class="text-[12px] font-black bn-text">মোট পদ: <span id="resTotalQty">০</span></p>
            <p id="rTotalColor" class="text-[16px] font-black bn-text">সর্বমোট: <span id="resTotalAmount">০</span> টাকা</p>
        </div>
    </div>

    <div class="mt-6 flex justify-between px-2">
        <div class="border-t border-black text-[8px] pt-1 bn-text text-center w-20">ক্রেতার স্বাক্ষর</div>
        <div class="border-t border-black text-[8px] pt-1 bn-text text-center w-20">কর্তৃপক্ষ</div>
    </div>
    
    <p class="text-center text-[8px] text-gray-500 mt-4 border-t pt-1 bn-text">System by Nazrul AI | 01727003670</p>
</div>

<script type="module">
    // ... (Firebase initialization and logic stays the same)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAM4gC_el-phDAgrhMazE8xVaTKnWU0NU4",
        authDomain: "fainal-abir-store-chhatak.firebaseapp.com",
        projectId: "fainal-abir-store-chhatak",
        storageBucket: "fainal-abir-store-chhatak.firebasestorage.app",
        messagingSenderId: "859240180075",
        appId: "1:859240180075:web:05d884a0dbe0ec792a042e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let settings = {};
    let lastSearchData = null;
    let editMode = false;
    let currentEditId = null;

    onSnapshot(doc(db, "admin", "settings"), (doc) => {
        if(doc.exists()){
            settings = doc.data();
            applySettings();
        }
    });

    function applySettings() {
        document.getElementById('uName').innerText = settings.name;
        document.getElementById('uName').style.color = settings.color;
        document.getElementById('uAddress').innerText = settings.address;
        document.getElementById('uLogo').style.borderColor = settings.color;
        document.getElementById('finalBtn').style.backgroundColor = settings.color;
        
        document.getElementById('rShopName').innerText = settings.name;
        document.getElementById('rShopName').style.color = settings.color;
        document.getElementById('rShopAddress').innerText = settings.address;
        document.getElementById('rShopPhone').innerText = "মোবাইল: " + settings.phone;
        document.getElementById('rTableHead').style.backgroundColor = settings.color;
        document.getElementById('rTotalColor').style.color = settings.color;
    }

    const toBn = n => n.toString().replace(/\d/g, d => "০১২৩৪৫৬৭৮৯"[d]);

    function clock() {
        const d = new Date();
        document.getElementById('liveClock').innerText = d.toLocaleTimeString('en-US');
        const options = { day: 'numeric', month: 'long', year: 'numeric' };
        document.getElementById('liveDate').innerText = d.toLocaleDateString('bn-BD', options);
    }
    setInterval(clock, 1000); clock();

    window.checkPass = () => {
        if(document.getElementById('passInput').value === settings.pass) {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainApp').classList.remove('hidden');
        } else { alert(settings.error || "ভুল পাসওয়ার্ড!"); }
    };

    window.searchMemo = async () => {
        const id = document.getElementById('searchInput').value.trim().toUpperCase();
        if(!id) return alert("আইডি দিন!");
        const docSnap = await getDoc(doc(db, "receipts", id));
        if (docSnap.exists()) {
            lastSearchData = docSnap.data();
            document.getElementById('searchOptions').classList.remove('hidden');
            alert("মেমো পাওয়া গেছে!");
        } else { 
            document.getElementById('searchOptions').classList.add('hidden');
            alert("পাওয়া যায়নি!"); 
        }
    };

    window.quickDownload = async () => {
        updateReceiptView(lastSearchData);
        await captureAndDownload(lastSearchData.id);
    };

    window.editMemo = () => {
        editMode = true;
        currentEditId = lastSearchData.id;
        document.getElementById('cName').value = lastSearchData.cName;
        document.getElementById('cPhone').value = lastSearchData.cPhone;
        const list = document.getElementById('itemsList');
        list.innerHTML = "";
        lastSearchData.items.forEach(item => {
            const div = document.createElement('div');
            div.className = "item-row flex gap-2 items-center";
            div.innerHTML = `<input type="text" value="${item.n}" class="item-n flex-1 p-4 bg-gray-800 rounded-xl text-sm text-white border border-gray-700 bn-text">
                             <input type="number" value="${item.p}" class="item-p w-24 p-4 bg-gray-800 rounded-xl text-sm text-white border border-gray-700">
                             <button onclick="this.parentElement.remove()" class="w-10 h-10 bg-red-600 rounded-full font-black text-white">-</button>`;
            list.appendChild(div);
        });
        document.getElementById('searchOptions').classList.add('hidden');
        document.getElementById('finalBtn').innerText = "আপডেট ও ডাউনলোড";
        alert("আপনি এখন মেমোটি এডিট করতে পারবেন।");
    };

    window.addRow = () => {
        const div = document.createElement('div');
        div.className = "item-row flex gap-2 items-center";
        div.innerHTML = `<input type="text" placeholder="পণ্যের নাম" class="item-n flex-1 p-4 bg-gray-800 rounded-xl text-sm text-white border border-gray-700 bn-text">
                         <input type="number" placeholder="দাম" class="item-p w-24 p-4 bg-gray-800 rounded-xl text-sm text-white border border-gray-700">
                         <button onclick="this.parentElement.remove()" class="w-10 h-10 bg-red-600 rounded-full font-black text-white">-</button>`;
        document.getElementById('itemsList').appendChild(div);
    };

    window.confirmDialog = () => {
        const names = document.querySelectorAll('.item-n');
        const prices = document.querySelectorAll('.item-p');
        let total = 0, count = 0;
        prices.forEach((p, i) => { if(names[i].value && p.value) { total += parseFloat(p.value); count++; } });
        if(count === 0) return alert("পণ্য দিন!");
        const msg = editMode ? "মেমোটি আপডেট করবেন?" : "নতুন মেমো জেনারেট করবেন?";
        if(confirm(`মোট পদ: ${count}\nমোট: ${total} টাকা\n${msg}`)) startGeneration(total, count);
    };

    async function startGeneration(total, count) {
        document.getElementById('clickSound').play();
        const names = document.querySelectorAll('.item-n');
        const prices = document.querySelectorAll('.item-p');
        const cName = document.getElementById('cName').value || "নগদ ক্রেতা";
        const cPhone = document.getElementById('cPhone').value || "N/A";
        let items = [];
        names.forEach((n, i) => { if(n.value) items.push({n: n.value, p: prices[i].value}); });

        const id = editMode ? currentEditId : "TVS-" + Math.floor(100000 + Math.random() * 900000);
        const dateTime = document.getElementById('liveDate').innerText + " | " + document.getElementById('liveClock').innerText;

        const memoData = {id, cName, cPhone, items, total, dateTime};
        updateReceiptView(memoData);
        await setDoc(doc(db, "receipts", id), memoData);

        document.getElementById('processingOverlay').style.display = 'flex';
        let s = 10;
        const timer = setInterval(async () => {
            s--; document.getElementById('countdown').innerText = toBn(s);
            if(s <= 0) {
                clearInterval(timer);
                document.getElementById('successSound').play();
                await captureAndDownload(id);
                location.reload();
            }
        }, 1000);
    }

    function updateReceiptView(data) {
        document.getElementById('resID').innerText = "ID: " + data.id;
        document.getElementById('resDateTime').innerText = data.dateTime;
        document.getElementById('resName').innerText = data.cName;
        document.getElementById('resPhone').innerText = data.cPhone;
        document.getElementById('resTotalQty').innerText = toBn(data.items.length);
        document.getElementById('resTotalAmount').innerText = toBn(data.total);
        let rows = "";
        data.items.forEach(item => { 
            rows += `<tr><td class="bn-text">${item.n}</td><td class="text-right">${toBn(item.p)} টাকা</td></tr>`; 
        });
        document.getElementById('rTableBody').innerHTML = rows;
    }

    async function captureAndDownload(id) {
        const receipt = document.getElementById('receiptDesign');
        const canvas = await html2canvas(receipt, { 
            scale: 3, 
            useCORS: true, 
            allowTaint: true,
            backgroundColor: "#ffffff",
            width: 302,
            windowHeight: receipt.scrollHeight
        });
        const link = document.createElement('a');
        link.download = `Memo_${id}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
    }
</script>

</body>
</html>
